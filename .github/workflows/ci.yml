name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: 3. Install Dependencies
        run: npm ci

      - name: 4. Prettier
        run: npm run format:check

      - name: 5. ESLint
        run: npm run lint

      - name: 6. Build
        run: npm run build
